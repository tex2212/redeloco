<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Loja RedeLoco</title>

<style>

body{
background:#0f172a;
font-family:Arial;
color:white;
text-align:center;
margin:0;
}

header{
background:#020617;
padding:25px;
font-size:28px;
font-weight:bold;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
padding:40px;
}

.vip{
background:#1e293b;
padding:20px;
border-radius:12px;
width:220px;
box-shadow:0 0 10px rgba(0,0,0,0.5);
}

.vip img{
width:120px;
}

.price{
font-size:22px;
margin:10px 0;
color:#38bdf8;
}

button{
background:#22c55e;
border:none;
padding:10px 20px;
border-radius:8px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#16a34a;
}

.nick{
margin-top:20px;
}

input{
padding:10px;
border-radius:6px;
border:none;
}

</style>

</head>

<body>

<header>
RedeLoco - Loja Oficial
</header>

<div class="nick">
Digite seu nick: <br><br>
<input placeholder="Seu nick no servidor">
</div>

<div class="container">

<div class="vip">
<img src="https://mc-heads.net/avatar/Notch">
<h3>VIP LOCO</h3>
<div class="price">R$100</div>
<button>Comprar</button>
</div>

<div class="vip">
<img src="https://mc-heads.net/avatar/Steve">
<h3>VIP RUBI</h3>
<div class="price">R$50</div>
<button>Comprar</button>
</div>

<div class="vip">
<img src="https://mc-heads.net/avatar/Alex">
<h3>VIP SAFIRA</h3>
<div class="price">R$35</div>
<button>Comprar</button>
</div>

<div class="vip">
<img src="https://mc-heads.net/avatar/Jeb_">
<h3>VIP ESMERALDA</h3>
<div class="price">R$25</div>
<button>Comprar</button>
</div>

<div class="vip">
<img src="https://mc-heads.net/avatar/Dinnerbone">
<h3>VIP PÉROLA</h3>
<div class="price">R$12</div>
<button>Comprar</button>
</div>

<div class="vip">
<img src="https://mc-heads.net/avatar/Herobrine">
<h3>VIP FLY</h3>
<div class="price">R$15</div>
<button>Comprar</button>
</div>

</div>

</body>
</html>
